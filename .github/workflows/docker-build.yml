name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  schedule:
    # Rebuild weekly to pick up Alpine package updates
    - cron: "0 6 * * 1"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get Postfix and Alpine versions
        id: versions
        run: |
          ALPINE_TAG=$(grep '^FROM alpine:' Dockerfile | sed 's/FROM alpine://')
          POSTFIX_VERSION=$(docker run --rm alpine:${ALPINE_TAG} sh -c 'apk update -q && apk search -e postfix' | grep '^postfix-[0-9]' | sed 's/postfix-\([0-9.]*\).*/\1/')
          ALPINE_VERSION=$(docker run --rm alpine:${ALPINE_TAG} cat /etc/alpine-release)
          echo "Postfix version: ${POSTFIX_VERSION}"
          echo "Alpine version: ${ALPINE_VERSION}"
          echo "postfix=${POSTFIX_VERSION}" >> $GITHUB_OUTPUT
          echo "alpine=${ALPINE_VERSION}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/postfix-pg:latest
            ghcr.io/${{ github.repository_owner }}/postfix-pg:${{ steps.versions.outputs.postfix }}-alpine${{ steps.versions.outputs.alpine }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
